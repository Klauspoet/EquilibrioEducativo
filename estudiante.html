<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiante — Equilibrio Educativo</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="app-layout">

        <nav class="sidebar">
           <img src="img/logo.png" class="sidebar-logo" style="width: 44px; height: 44px; object-fit: contain; border-radius: 12px; padding: 4px;" alt="Logo">
            <a href="chat.html" class="sidebar-icon" title="Chat">💬</a>
            <a href="#" class="sidebar-icon" title="Historial">📊</a>
            <a href="#" class="sidebar-icon bottom" title="Cerrar sesión" id="btn-logout">🚪</a>
        </nav>

        <main class="page-content">
            <div class="contenedor">
                <h2>Hola, <span id="nombre-usuario"></span> 👋</h2>
                <p>¿Cómo te sientes hoy? Elige un psicoorientador para iniciar una conversación privada.</p>

                <div class="emotion-row">
                    <div class="emo-card"><span class="emoji">😔</span><span>Triste</span></div>
                    <div class="emo-card"><span class="emoji">😐</span><span>Regular</span></div>
                    <div class="emo-card"><span class="emoji">🙂</span><span>Bien</span></div>
                    <div class="emo-card"><span class="emoji">😄</span><span>Genial</span></div>
                    <div class="emo-card"><span class="emoji">😰</span><span>Ansioso</span></div>
                </div>

                <h2 style="margin-bottom: 16px;">Psicoorientadores disponibles</h2>
                <div id="lista-psicoorientadores" class="lista-cards"></div>
            </div>
        </main>

    </div>

    <script type="module" src="js/estudiante.js"></script>
</body>
</html>
