<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — Equilibrio Educativo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <meta name="description" content="Recupera tu contraseña de Equilibrio Educativo.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <nav class="top-nav">
        <a href="/index.html">
            <img src="/img/logo.png" alt="Equilibrio Educativo" class="nav-logo">
        </a>
        <span class="nav-brand">Equilibrio Educativo</span>
    </nav>

    <header>
        <img src="/img/logo.png" style="width: 80px; vertical-align: middle; margin-right: 10px; mix-blend-mode: multiply;" alt="Logo">
        <h1>Recuperar contraseña</h1>
        <p>Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
    </header>

    <main>
        <div class="tarjeta-inicio animate-on-scroll">
            <h2>Recuperar contraseña</h2>

            <form id="form-recuperar" novalidate>
                <div class="campo">
                    <label>Correo electrónico</label>
                    <input type="email" id="correo" placeholder="nombre@colegio.edu.co" required>
                </div>

                <button type="submit" class="btn-principal" id="btn-enviar" style="width:100%; margin-top:10px;">
                    Enviar enlace
                </button>
            </form>

            <p style="margin-top:16px; color:#6B7280; text-align:center; font-size:0.9rem;">
                <a href="login.html" style="color:#3B82F6;">Volver a inicio de sesión</a>
            </p>

            <p id="mensaje" style="margin-top:12px; color:#EF4444; text-align:center; font-size:0.85rem;"></p>
        </div>
    </main>

    <footer>
        <p>© 2026 Equilibrio Educativo — Todos los derechos reservados</p>
    </footer>

    <div id="loader-overlay" class="loader-overlay" style="display:none;">
        <div class="hexagon-loader">
            <div class="hexagon hex-outer"></div>
            <div class="hexagon hex-middle"></div>
            <div class="hexagon hex-inner"></div>
        </div>
    </div>
    <script type="module">
        import { supabase } from './js/supabase.js'
        import { mostrarMensaje, showLoader, hideLoader } from './js/utilidades.js'

        const mensaje = document.getElementById('mensaje')
        const btn = document.getElementById('btn-enviar')
        const inputCorreo = document.getElementById('correo')

        const COOLDOWN_MS = 60000 // debe coincidir con el rate-limit de Supabase para reset de contraseña
        const COOLDOWN_KEY = 'ee-reset-cooldown'
        const REGEX_CORREO = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

        let temporizador = null

        function segundosRestantes() {
            const hasta = Number(localStorage.getItem(COOLDOWN_KEY) || 0)
            return Math.max(0, Math.ceil((hasta - Date.now()) / 1000))
        }

        function activarCooldownUI() {
            const restantes = segundosRestantes()
            if (restantes <= 0) {
                btn.disabled = false
                btn.textContent = 'Enviar enlace'
                clearInterval(temporizador)
                return
            }
            btn.disabled = true
            btn.textContent = `Espera ${restantes}s para reintentar`
            temporizador = temporizador || setInterval(activarCooldownUI, 1000)
        }

        activarCooldownUI()

        document.getElementById('form-recuperar').addEventListener('submit', async (e) => {
            e.preventDefault()
            const correo = inputCorreo.value.trim()

            if (!correo) {
                mostrarMensaje(mensaje, 'Por favor ingresa tu correo.', 'error')
                return
            }

            if (!REGEX_CORREO.test(correo)) {
                mostrarMensaje(mensaje, 'Ingresa un correo válido.', 'error')
                return
            }

            if (segundosRestantes() > 0) {
                mostrarMensaje(mensaje, `Ya enviamos un enlace. Espera ${segundosRestantes()}s antes de reintentar.`, 'info')
                return
            }

            btn.disabled = true
            mostrarMensaje(mensaje, 'Enviando enlace...', 'info')
            showLoader()

            const controlador = new AbortController()
            const idTimeout = setTimeout(() => controlador.abort(), 10000)

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(correo, {
                    redirectTo: 'https://equilibrio-educativo.vercel.app/nueva-contrasena.html'
                })

                clearTimeout(idTimeout)

                if (!error) {
                    localStorage.setItem(COOLDOWN_KEY, String(Date.now() + COOLDOWN_MS))
                    mostrarMensaje(mensaje, 'Si el correo está registrado, recibirás un enlace en unos minutos.', 'exito')
                    activarCooldownUI()
                } else if (error.status === 429) {
                    localStorage.setItem(COOLDOWN_KEY, String(Date.now() + COOLDOWN_MS))
                    mostrarMensaje(mensaje, 'Ya se envió un enlace recientemente. Intenta más tarde.', 'error')
                    activarCooldownUI()
                } else {
                    mostrarMensaje(mensaje, 'No pudimos procesar la solicitud. Intenta de nuevo.', 'error')
                    btn.disabled = false
                }
            } catch (err) {
                clearTimeout(idTimeout)
                const esTimeout = err.name === 'AbortError'
                mostrarMensaje(mensaje, esTimeout ? 'La solicitud tardó demasiado. Intenta de nuevo.' : 'Error inesperado: ' + err.message, 'error')
                btn.disabled = false
            } finally {
                hideLoader()
            }
        })
    </script>
    <script src="js/animations.js"></script>
</body>
</html>
