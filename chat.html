<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Equilibrio Educativo</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="app-layout">

        <nav class="sidebar">
            <img src="img/logo.png" class="sidebar-logo" style="width: 44px; height: 44px; object-fit: contain; border-radius: 12px; padding: 4px;" alt="Logo">
            <a href="estudiante.html" class="sidebar-icon" title="Inicio">🏠</a>
            <a href="#" class="sidebar-icon active" title="Chat">💬</a>
            <a href="#" class="sidebar-icon" title="Historial">📊</a>
            <a href="#" class="sidebar-icon bottom" title="Cerrar sesión" id="btn-logout">🚪</a>
        </nav>

        <main class="page-content">
            <div class="contenedor-chat">

                <div class="chat-topbar">
                    <div class="chat-avatar" id="avatar-receptor">👤</div>
                    <div>
                        <h4 id="nombre-receptor">Cargando...</h4>
                        <p>En línea</p>
                    </div>
                </div>

                <div id="mensajes" class="mensajes"></div>

                <div class="input-chat">
                    <input
                        type="text"
                        id="texto-mensaje"
                        placeholder="Escribe tu mensaje..."
                    >
                    <button id="btn-enviar" class="btn-principal">Enviar ➤</button>
                </div>

            </div>
        </main>

    </div>

    <script type="module" src="js/chat.js"></script>
</body>
</html>
