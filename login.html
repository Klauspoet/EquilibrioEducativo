<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Equilibrio Educativo</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
      <img src="img/logo.png" style="width: 80px; vertical-align: middle; margin-right: 10px; mix-blend-mode: multiply;" alt="Logo">
    </header>

    <main>
        <div class="tarjeta-inicio">
            <h2>Bienvenido de nuevo</h2>

            <div class="campo">
                <label>Correo institucional</label>
                <input type="email" id="correo" placeholder="nombre@colegio.edu.co">
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="contrasena" placeholder="Tu contraseña">
            </div>

            <button class="btn-principal" id="btn-login" style="width:100%; margin-top:10px;">
                Iniciar sesión
            </button>

            <p style="margin-top:16px; color:#555;">
                ¿No tienes cuenta? <a href="registro.html" style="color:#2d6a4f;">Regístrate</a>
            </p>

            <p id="mensaje" style="margin-top:12px; color:red;"></p>
        </div>
    </main>

    <footer>
        <p>© 2025 Equilibrio Educativo — Todos los derechos reservados</p>
    </footer>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
