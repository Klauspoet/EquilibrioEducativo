<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Equilibrio Educativo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <meta name="description" content="Inicia sesión en Equilibrio Educativo — tu espacio seguro de bienestar emocional.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
      <img src="/img/logo.png" style="width: 80px; vertical-align: middle; margin-right: 10px; mix-blend-mode: multiply;" alt="Logo">
    </header>

    <main>
        <div class="tarjeta-inicio">
            <h2>Bienvenido de nuevo</h2>

            <div class="campo">
                <label>Correo institucional</label>
                <input type="email" id="correo" placeholder="nombre@colegio.edu.co">
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="contrasena" placeholder="Tu contraseña">
            </div>

            <button class="btn-principal" id="btn-login" style="width:100%; margin-top:10px;">
                Iniciar sesión
            </button>

            <p style="margin-top:16px; color:#555;">
                ¿No tienes cuenta? <a href="registro.html" style="color:#3B82F6;">Regístrate</a>
            </p>

            <p id="mensaje" style="margin-top:12px; color:red;"></p>
        </div>
    </main>

    <footer>
        <p>© 2025 Equilibrio Educativo — Todos los derechos reservados</p>
    </footer>

    <div id="loader-overlay" class="loader-overlay" style="display:none;">
        <div class="hexagon-loader">
            <div class="hexagon hex-outer"></div>
            <div class="hexagon hex-middle"></div>
            <div class="hexagon hex-inner"></div>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
