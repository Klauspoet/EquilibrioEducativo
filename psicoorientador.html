<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Psicoorientador — Equilibrio Educativo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <meta name="description" content="Panel de psicoorientador — Equilibrio Educativo. Gestiona tus conversaciones activas con estudiantes.">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="app-layout">

        <nav class="sidebar">
           <img src="img/logo.png" class="sidebar-logo" style="width: 44px; height: 44px; object-fit: contain; border-radius: 12px; padding: 4px;" alt="Logo">
            <a href="#" class="sidebar-icon" title="Chats" aria-label="Chats">💬</a>
            <a href="#" class="sidebar-icon" title="Estadísticas" aria-label="Estadísticas">📊</a>
           <a href="#" class="sidebar-icon" title="Cambiar tema" id="btn-tema" aria-label="Cambiar tema">🌙</a>
<a href="#" class="sidebar-icon bottom" title="Cerrar sesión" id="btn-logout" aria-label="Cerrar sesión">🚪</a>
        </nav>

        <main class="page-content">
            <div class="contenedor">
                <h2>Hola, <span id="nombre-usuario"></span> 👋</h2>
                <p>Estas son tus conversaciones activas con estudiantes.</p>

                <div id="lista-chats" class="lista-cards"></div>
            </div>
        </main>

    </div>

    <script type="module" src="js/psicoorientadores.js"></script>
    <script type="module" src="js/tema.js"></script>
</body>
</html>
